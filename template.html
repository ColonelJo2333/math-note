<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  {{favicon_tag}}
  <link rel="stylesheet" href="style.css">
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      throwOnError: false
    });">
  </script>
</head>
<body>

  {{page_content}}

  <footer class="site-footer">
    <a href="index.html">{{site_title}}</a><span class="footer-sep">,</span>
    <span class="footer-copy">&copy; {{year}}</span>
    <a href="{{author_link}}">{{author}}</a>
  </footer>

  <script>
  // 目录动态淡出效果（根据滚动位置）
  (function() {
    var toc = document.querySelector('.toc');
    if (!toc) return;
    
    function updateMask() {
      var st = toc.scrollTop;
      var ch = toc.clientHeight;
      var sh = toc.scrollHeight;
      
      // 如果内容完全可见，不需要淡出
      if (sh <= ch) {
        toc.style.maskImage = 'none';
        return;
      }
      
      // 判断是否在顶端或底端
      var atTop = st < 1;
      var atBottom = sh - st - ch < 1;
      
      var maskImage;
      if (atTop && atBottom) {
        // 两边都贴边，不淡出
        maskImage = 'none';
      } else if (atTop) {
        // 在顶端，只在底部淡出
        maskImage = 'linear-gradient(to bottom, black 0%, black 92%, transparent 100%)';
      } else if (atBottom) {
        // 在底端，只在顶部淡出
        maskImage = 'linear-gradient(to bottom, transparent 0%, black 8%, black 100%)';
      } else {
        // 中间滚动，两边都淡出
        maskImage = 'linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%)';
      }
      
      toc.style.maskImage = maskImage;
    }
    
    toc.addEventListener('scroll', updateMask, { passive: true });
    updateMask();
  })();
  
  // 目录滚动高亮
  (function() {
    var toc = document.getElementById('toc');
    if (!toc || !toc.querySelector('.toc-item')) {
      if (toc) toc.style.display = 'none';
      return;
    }
    var links = toc.querySelectorAll('.toc-item');
    var ids = Array.from(links).map(function(a) {
      return document.getElementById(a.getAttribute('href').slice(1));
    }).filter(Boolean);

    function highlight() {
      var scrollY = window.scrollY + 80;
      var current = null;
      for (var i = 0; i < ids.length; i++) {
        if (ids[i].offsetTop <= scrollY) current = i;
      }
      links.forEach(function(a, i) {
        a.classList.toggle('active', i === current);
      });
    }
    window.addEventListener('scroll', highlight, { passive: true });
    highlight();
  })();

  // 首页分类筛选
  (function() {
    var nav = document.querySelector('.category-nav');
    if (!nav) return;
    nav.addEventListener('click', function(e) {
      if (e.target.tagName !== 'A') return;
      e.preventDefault();
      var cat = e.target.dataset.cat;
      nav.querySelectorAll('a').forEach(function(a) {
        a.classList.toggle('active', a.dataset.cat === cat);
      });
      // 显示/隐藏时间线条目
      document.querySelectorAll('.timeline-item').forEach(function(item) {
        item.style.display = (!cat || item.dataset.cat === cat) ? '' : 'none';
      });
      // 显示/隐藏年份标题
      document.querySelectorAll('.timeline-year').forEach(function(yr) {
        var next = yr.nextElementSibling;
        var hasVisible = false;
        while (next && !next.classList.contains('timeline-year')) {
          if (next.style.display !== 'none') hasVisible = true;
          next = next.nextElementSibling;
        }
        yr.style.display = hasVisible ? '' : 'none';
      });
    });
  })();

  </script>
</body>
</html>
