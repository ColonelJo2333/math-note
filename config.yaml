site:
  title: "流形上的涂鸦"
  subtitle: "Scribbles on Manifolds — 一些数学笔记与思考"
  # 站点根地址（用于生成 sitemap.xml）
  # 示例: "https://notes.example.com"
  url: "https://notes.chenhuhuhu.space/"
  author: "ChenHu"
  author_link: "https://chenhuhuhu.space"
  # 网站图标 (请放置对应文件到 images 文件夹，如 /images/favicon.ico)
  favicon: "/images/favicon.ico"

# 社交媒体链接
social_links:
  - name: "主博客"
    url: "https://chenhuhuhu.space"
    icon: "blog"      # 可选值: blog, pixiv, github, bilibili
  - name: "Pixiv"
    url: "https://www.pixiv.net/users/79490957"
    icon: "pixiv"
  - name: "GitHub"
    url: "https://github.com/ColonelJo2333"
    icon: "github"
  - name: "Bilibili"
    url: "https://space.bilibili.com/506403405"
    icon: "bilibili"

# 网站色彩主题配置
theme:
  # 背景模式配置：
  # "solid" - 纯色背景（默认），不渲染任何图案，此时仅使用 "bg" 属性的颜色
  # "sketch" - 数学手写草稿背景（使用 rough.js 动态绘制裤子图和庞加莱圆盘测地线）
  # "image" - 自定义图片背景（使用 "background_image" 的链接铺满整个背景并应用相应的透明渐变遮罩以保障阅读）
  background_mode: "sketch"
  background_image: "https://example.com/your-image.jpg" # 仅在 background_mode 为 "image" 时生效

  bg:         "#FAF9F5"                     # 页面背景色
  bg-card:    "#FFFFFF"                     # 卡片/区块背景色
  bg-code:    "#2D2D2D"                     # 代码块背景色
  fg:         "#1A1A1A"                     # 主文本颜色
  fg-sec:     "#555249"                     # 次要文本颜色
  fg-muted:   "#9C978B"                     # 弱化文本颜色
  accent:     "#FEB246"                     # 强调色/主色调 (如链接、按钮)
  accent-dark: "#D4922A"                    # 强调色(悬停状态的深色)
  border:     "#E6E3DA"                     # 边框常规颜色
  rail:       "rgba(230, 227, 218, 0.88)"   # 侧边栏装饰线颜色
